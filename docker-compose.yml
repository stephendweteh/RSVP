# Optional: MySQL when you don't use Homebrew's server (or want an isolated DB).
# Start: docker compose up -d
# Then in .env: DB_HOST=127.0.0.1 DB_PORT=3307 DB_DATABASE=rsvp DB_USERNAME=root DB_PASSWORD=rsvp_dev_root
services:
  mysql:
    image: mysql:8.4
    container_name: rsvp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rsvp_dev_root
      MYSQL_DATABASE: rsvp
    ports:
      - '3307:3306'
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - rsvp-mysql-data:/var/lib/mysql

volumes:
  rsvp-mysql-data:
